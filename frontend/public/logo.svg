<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="200" height="60">
  <defs>
    <linearGradient id="pinkGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#be185d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#be185d;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shield (Main) -->
  <path d="M 50 20 L 70 32 L 70 60 Q 70 80 50 90 Q 30 80 30 60 L 30 32 Z" fill="url(#shieldGradient)" stroke="#f3f4f6" stroke-width="1.5" filter="drop-shadow(0 4px 8px rgba(0,0,0,0.2))"/>
  
  <!-- Shield Inner Glow -->
  <circle cx="50" cy="55" r="12" fill="#fbbf24" opacity="0.6"/>
  <circle cx="50" cy="55" r="8" fill="#fde047" opacity="0.8"/>

  <!-- Sword -->
  <line x1="58" y1="15" x2="72" y2="40" stroke="#ec4899" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="58" cy="15" r="3" fill="#fbbf24"/>
  <polygon points="58,15 56,18 60,18" fill="#fbbf24"/>

  <!-- Woman Head Silhouette -->
  <circle cx="50" cy="18" r="5" fill="#1e1b4b"/>
  <!-- Hair -->
  <path d="M 45 15 Q 45 10 50 9 Q 55 10 55 15" fill="#1e1b4b"/>

  <!-- Left Wing -->
  <path d="M 40 32 Q 25 28 20 40 Q 25 35 40 36 L 42 34 Z" fill="url(#pinkGradient)" opacity="0.8"/>
  <path d="M 38 36 Q 20 33 15 45 Q 20 38 38 38" fill="#ec4899" opacity="0.6"/>

  <!-- Right Wing -->
  <path d="M 60 32 Q 75 28 80 40 Q 75 35 60 36 L 58 34 Z" fill="url(#purpleGradient)" opacity="0.8"/>
  <path d="M 62 36 Q 80 33 85 45 Q 80 38 62 38" fill="#a855f7" opacity="0.6"/>

  <!-- Sparkles -->
  <circle cx="35" cy="25" r="1.5" fill="#fde047" opacity="0.7"/>
  <circle cx="65" cy="30" r="1.5" fill="#fbbf24" opacity="0.7"/>
  <circle cx="45" cy="12" r="1" fill="#fde047" opacity="0.5"/>
  <circle cx="55" cy="28" r="1" fill="#fbbf24" opacity="0.5"/>

  <!-- RAKSHA Text -->
  <text x="110" y="65" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#7f1d1d" letter-spacing="1.5">
    RAKSHA
  </text>
  
  <!-- Subtle underline -->
  <line x1="110" y1="72" x2="280" y2="72" stroke="#ec4899" stroke-width="1.5" opacity="0.6"/>
</svg>
